<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #101114;
            color: #f4f6fb;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 18px 22px;
            border-bottom: 1px solid #252833;
            background: #151820;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        header p {
            margin: 6px 0 0;
            color: #aab0c0;
            font-size: 13px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: min(760px, 82%);
            padding: 12px 14px;
            border-radius: 8px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
        }

        .user {
            align-self: flex-end;
            background: #2f6fed;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .bot {
            align-self: flex-start;
            background: #222632;
            color: #eef1f8;
            border-bottom-left-radius: 2px;
        }

        .error {
            background: #4a1f26;
            color: #ffd8df;
        }

        .composer {
            display: flex;
            gap: 10px;
            padding: 14px;
            border-top: 1px solid #252833;
            background: #151820;
        }

        #messageInput {
            flex: 1;
            min-width: 0;
            border: 1px solid #303442;
            border-radius: 8px;
            background: #0f1117;
            color: #ffffff;
            padding: 13px 14px;
            font-size: 15px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #4d86ff;
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 0 16px;
            min-width: 48px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            background: #2f6fed;
        }

        button:hover {
            background: #245ed0;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        #voiceButton {
            background: #2b303d;
        }

        #voiceButton:hover {
            background: #383f50;
        }

        .status {
            padding: 0 16px 12px;
            min-height: 20px;
            background: #151820;
            color: #aab0c0;
            font-size: 13px;
        }

        @media (max-width: 640px) {
            header {
                padding: 14px 16px;
            }

            #chat {
                padding: 16px;
            }

            .message {
                max-width: 92%;
            }

            .composer {
                padding: 12px;
            }

            button {
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header>
            <h1>Assistente Pessoal</h1>
            <p>Comandos: adicionar tarefa X, listar tarefas, remover tarefa X</p>
        </header>

        <section id="chat" aria-live="polite">
            <div class="message bot">Olá! Pode digitar ou falar comigo.</div>
        </section>

        <form id="chatForm" class="composer">
            <button id="voiceButton" type="button" title="Falar">🎤</button>
            <input id="messageInput" type="text" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendButton" type="submit">Enviar</button>
        </form>
        <div id="status" class="status"></div>
    </main>

    <script>
        const chat = document.getElementById("chat");
        const chatForm = document.getElementById("chatForm");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const voiceButton = document.getElementById("voiceButton");
        const statusText = document.getElementById("status");

        function addMessage(text, type) {
            const message = document.createElement("div");
            message.className = `message ${type}`;
            message.textContent = text;
            chat.appendChild(message);
            chat.scrollTop = chat.scrollHeight;
            return message;
        }

        function setStatus(text) {
            statusText.textContent = text || "";
        }

        async function sendMessage(text) {
            const message = text.trim();
            if (!message) {
                return;
            }

            addMessage(message, "user");
            messageInput.value = "";
            sendButton.disabled = true;
            setStatus("Respondendo...");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error("Backend offline");
                }

                const data = await response.json();
                addMessage(data.response || "Erro ao responder", "bot");
            } catch (error) {
                addMessage("Backend offline ou erro de conexão.", "bot error");
            } finally {
                sendButton.disabled = false;
                setStatus("");
                messageInput.focus();
            }
        }

        chatForm.addEventListener("submit", function(event) {
            event.preventDefault();
            sendMessage(messageInput.value);
        });

        messageInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        voiceButton.addEventListener("click", function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                addMessage("Seu navegador não suporta reconhecimento de voz.", "bot error");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "pt-BR";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            setStatus("Ouvindo...");
            voiceButton.disabled = true;

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                messageInput.value = text;
                sendMessage(text);
            };

            recognition.onerror = function() {
                addMessage("Erro ao capturar áudio.", "bot error");
                setStatus("");
            };

            recognition.onend = function() {
                voiceButton.disabled = false;
                if (statusText.textContent === "Ouvindo...") {
                    setStatus("");
                }
            };

            recognition.start();
        });
    </script>
</body>
</html>
